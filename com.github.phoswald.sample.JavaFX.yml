id: com.github.phoswald.sample.JavaFX
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: sample-javafx
finish-args:
  # For UI, supporting both Wayland and X11
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  # For webview
  - --share=network 
  # For accessing database files in the home directory
  - --filesystem=home
modules:
  - name: sample-javafx
    buildsystem: simple
    build-commands:
      - install -Dm755 sample-javafx.sh /app/bin/sample-javafx
      - cp -r dist /app/dist
      - cp -r jdk  /app/jdk
    sources:
      - type: file
        path: sample-javafx.sh

      - type: dir
        path: prepare/maven
        dest: dist

      - type: dir
        path: prepare/jdk
        dest: jdk
